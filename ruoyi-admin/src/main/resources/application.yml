ruoyi:
  name: Zachary Jun
  version: 3.9.0
  copyrightYear: 2025
  profile: D:/ruoyi/uploadPath
  addressEnabled: false
  captchaType: math


server:
  port: 16666
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    accept-count: 1000
    threads:
      max: 800
      min-spare: 100


logging:
  level:
    com.ruoyi: debug
    org.springframework: warn


user:
  password:
    maxRetryCount: 5
    lockTime: 10


spring:
  messages:
    basename: i18n/messages
  profiles:
    active: druid
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  devtools:
    restart:
      enabled: true
  redis:
    host: localhost
    port: 6379
    database: 0
    password: 123456
    timeout: 10s
    lettuce:
      pool:
        min-idle: 0
        max-idle: 8
        max-active: 8
        max-wait: -1ms


token:
  header: Authorization
  secret: abcdefghijklmnopqrstuvwxyz
  expireTime: 30


mybatis:
  typeAliasesPackage: com.ruoyi.**.domain
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  configLocation: classpath:mybatis/mybatis-config.xml


pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql


swagger:
  enabled: true
  pathMapping: /dev-api


referer:
  enabled: false
  allowed-domains: localhost,127.0.0.1,ruoyi.vip,www.ruoyi.vip


xss:
  enabled: true
  excludes: /system/notice
  urlPatterns: /system/*,/monitor/*,/tool/*
